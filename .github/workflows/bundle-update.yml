name: Bundle Update

on:
  workflow_dispatch:
    inputs:
      gems:
        description: 'Gems to update (space-separated, leave blank for all)'
        required: false
        default: 'globalid rails-html-sanitizer loofah addressable tzinfo puma nokogiri better_errors rack websocket-extensions'

jobs:
  bundle-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/dependency-security-updates
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'
          bundler-cache: false

      - name: Update bundler and gems
        run: |
          gem install bundler
          GEMS="${{ github.event.inputs.gems }}"
          if [ -n "$GEMS" ]; then
            bundle update $GEMS
          else
            bundle update
          fi

      - name: Commit updated Gemfile.lock
        run: |
          git config user.name "Flux2[bot]"
          git config user.email "flux.civ@agentmail.to"
          git add Gemfile.lock
          if git diff --staged --quiet; then
            echo "No changes to Gemfile.lock"
          else
            git commit -m "fix: update Gemfile.lock via bundle update"
            git push
          fi
