name: Bundle Update

on:
  workflow_dispatch:
    inputs:
      gems:
        description: 'Gems to update (space-separated, leave blank for all)'
        required: false
        default: 'mimemagic globalid rails-html-sanitizer loofah addressable tzinfo puma nokogiri better_errors rack websocket-extensions'

jobs:
  bundle-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/dependency-security-updates
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby 2.7 with latest bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'
          bundler: latest
          bundler-cache: false

      - name: Patch Ruby version constraints for CI
        run: |
          # Comment out ruby version pin in Gemfile (2.5.3 not available, we use 2.7)
          sed -i "s/^ruby '2\.5\.3'/# ruby '2.5.3' # patched for CI/" Gemfile
          # Remove BUNDLED WITH constraint so bundler uses the installed version
          sed -i '/^BUNDLED WITH/{N;d}' Gemfile.lock
          echo "Gemfile ruby version constraint patched"
          echo "Gemfile.lock bundler constraint removed"

      - name: Update gems
        run: |
          GEMS="${{ github.event.inputs.gems }}"
          if [ -n "$GEMS" ]; then
            bundle update $GEMS --bundler
          else
            bundle update --bundler
          fi

      - name: Commit updated Gemfile.lock
        run: |
          git config user.name "Flux2[bot]"
          git config user.email "flux.civ@agentmail.to"
          git add Gemfile.lock
          if git diff --staged --quiet; then
            echo "No changes to Gemfile.lock"
          else
            git commit -m "fix: update Gemfile.lock via bundle update"
            git push
          fi
